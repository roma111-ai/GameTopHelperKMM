name: Build iOS

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'iosApp/**'
      - 'shared/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'gradle.properties'
  pull_request:
    branches: [ main ]

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build shared module for iOS
        run: |
          chmod +x gradlew
          ./gradlew :shared:iosX64Test :shared:iosArm64Test

      - name: Prepare iOS project
        run: |
          cd iosApp
          pod install || echo "No CocoaPods"

      - name: Build iOS
        run: |
          cd iosApp
          xcodebuild clean build \
            -scheme iosApp \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS build
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-debug
          path: iosApp/build/